name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PATHLAB_SECRET_KEY: ci-only-secret-not-used-in-production-0000000000000000

jobs:
  public-repository:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.12" }
      - run: python scripts/check_public_repository.py

  history-secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
          show-progress: false
      - name: Install verified Gitleaks release
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory /tmp gitleaks
          install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Scan complete Git history
        run: gitleaks git --redact --no-banner --log-opts="--all" .

  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: ruff check server tests migrations scripts
      - run: mypy server/wsi_viewer
      - run: pytest --cov=wsi_viewer --cov-report=term-missing

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          show-progress: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: "11.9.0" }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  dependencies:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.12" }
      - run: pip install --disable-pip-version-check pip-audit==2.10.1
      - run: pip-audit . --progress-spinner off
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: "11.9.0" }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high

  containers:
    runs-on: ubuntu-24.04
    env:
      DOMAIN: viewer.example.test
      ACME_EMAIL: ci@example.test
      PATHLAB_DATA_DIR: /tmp/pathlab-data
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          show-progress: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: docker compose -f deploy/compose.yaml config
      - name: Build ARM64 backend image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=backend
          --cache-to type=gha,mode=max,scope=backend
          -f deploy/Dockerfile.backend .
      - name: Build ARM64 web image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=web
          --cache-to type=gha,mode=max,scope=web
          -f deploy/Dockerfile.web .
