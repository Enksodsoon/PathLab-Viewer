name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: ruff check server tests migrations
      - run: mypy server/wsi_viewer
      - run: pytest --cov=wsi_viewer --cov-report=term-missing

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  containers:
    runs-on: ubuntu-24.04
    env:
      DOMAIN: viewer.example.test
      ACME_EMAIL: ci@example.test
      PATHLAB_SECRET_KEY: ci-only-secret-not-used-in-production
      PATHLAB_DATA_DIR: /tmp/pathlab-data
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Validate deployment shell syntax
        run: bash -n deploy/scripts/*.sh
      - name: Validate Compose configuration
        run: docker compose -f deploy/compose.yaml config
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e DOMAIN -e ACME_EMAIL
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Build ARM64 backend image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=backend
          --cache-to type=gha,mode=max,scope=backend
          -f deploy/Dockerfile.backend .
      - name: Build ARM64 web image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=web
          --cache-to type=gha,mode=max,scope=web
          -f deploy/Dockerfile.web .
