name: Fix security quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'security/public-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/public-hardening
          fetch-depth: 0
          persist-credentials: true
      - name: Restore unrelated files from main
        run: |
          git fetch origin main
          git restore --source=origin/main -- \
            migrations/versions/20260723_0006_library_domain_v2.py \
            migrations/versions/20260723_0007_share_privacy_state.py \
            server/wsi_viewer/auth.py \
            server/wsi_viewer/cli.py \
            server/wsi_viewer/conversion.py \
            server/wsi_viewer/library.py \
            server/wsi_viewer/models.py \
            server/wsi_viewer/request_limits.py \
            server/wsi_viewer/sharing.py \
            tests/backend/test_auth.py \
            tests/backend/test_backup_restore.py \
            tests/backend/test_cli.py \
            tests/backend/test_conversion.py \
            tests/backend/test_database.py \
            tests/backend/test_deploy_config.py \
            tests/backend/test_library_v2.py \
            tests/backend/test_storage.py \
            tests/load/generate_manifest.py \
            tests/load/test_load_contract.py \
            tests/load/test_manifest_generator.py
      - name: Commit focused security diff
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --quiet && exit 0
          git commit -m 'chore: keep public hardening diff focused'
          git push origin HEAD:security/public-hardening
