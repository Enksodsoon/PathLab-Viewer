name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Require a lockfile update for JavaScript manifest changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "${BASE_SHA}" HEAD > /tmp/pathlab-changed-files
          if grep -Eq '^(package.json|apps/web/package.json)$' /tmp/pathlab-changed-files; then
            grep -qx 'pnpm-lock.yaml' /tmp/pathlab-changed-files || {
              echo "pnpm-lock.yaml must change with a JavaScript package manifest."
              exit 1
            }
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install --disable-pip-version-check pip-audit==2.10.1
      - run: pip-audit . --progress-spinner off

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "11.9.0"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.14.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
