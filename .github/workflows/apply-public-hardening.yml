name: Apply public hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'security/public-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/public-hardening
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply reviewed transformations
        run: |
          rm -f apply-hardening-error.txt
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/apply_public_hardening.py')
          content = path.read_text(encoding='utf-8')
          old = '''def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              count = content.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              write(path, content.replace(old, new, 1))
          '''
          new = '''def _prefixed(value: str, prefix: str) -> str:
              return "".join(
                  prefix + line if line.strip() else line
                  for line in value.splitlines(keepends=True)
              )


          def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              prefixes = ("", "  ", "    ", "      ", "        ", "          ", "            ", "              ", "                ", "\\t")
              for prefix in prefixes:
                  candidate_old = _prefixed(old, prefix)
                  candidate_new = _prefixed(new, prefix)
                  count = content.count(candidate_old)
                  if count == 1:
                      write(path, content.replace(candidate_old, candidate_new, 1))
                      return
              raise RuntimeError(f"Expected one match in {path}, found 0 or multiple")
          '''
          if old not in content:
              raise SystemExit('transformer helper shape changed')
          content = content.replace(old, new, 1)
          content = content.replace(
              'sqlite:////data/db/pathlab.sqlite3',
              'sqlite:////data/database/pathlab.sqlite3',
          )
          content = content.replace(
              'PATHLAB_DATABASE_URL=sqlite:///./var/pathlab.sqlite3',
              'PATHLAB_DATABASE_URL=sqlite:////data/database/pathlab.sqlite3',
          )
          content = content.replace(
              '"## Security boundaries\\n"',
              '"## High-priority areas\\n"',
          )
          compose_edit = '''replace_once(
              "deploy/compose.yaml",
              "      PATHLAB_DATABASE_URL: sqlite:////data/database/pathlab.sqlite3\\n",
              "      PATHLAB_ENVIRONMENT: production\\n      PATHLAB_DATABASE_URL: sqlite:////data/database/pathlab.sqlite3\\n",
          )
          '''
          first = content.find(compose_edit)
          second = content.find(compose_edit, first + len(compose_edit))
          if first < 0 or second < 0:
              raise SystemExit('compose transformer shape changed')
          content = content[:second] + content[second + len(compose_edit):]
          path.write_text(content, encoding='utf-8')
          PY
          if python scripts/apply_public_hardening.py > /tmp/apply.log 2>&1; then
            exit 0
          fi
          tail -n 80 /tmp/apply.log > apply-hardening-error.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apply-hardening-error.txt
          git commit -m 'chore: capture hardening automation error'
          git push origin HEAD:security/public-hardening
          exit 1
      - name: Commit hardened tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --quiet && exit 0
          git commit -m 'security: harden public repository and deployment'
          git push origin HEAD:security/public-hardening
