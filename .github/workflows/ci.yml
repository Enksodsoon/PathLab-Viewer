name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: ruff check server tests migrations
      - run: mypy server/wsi_viewer
      - run: pytest --cov=wsi_viewer --cov-report=term-missing

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with: { version: "11.9.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  containers:
    runs-on: ubuntu-24.04
    env:
      DOMAIN: viewer.example.test
      ACME_EMAIL: ci@example.test
      PATHLAB_SECRET_KEY: ci-only-secret-not-used-in-production
      PATHLAB_DATA_DIR: /tmp/pathlab-data
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: docker compose -f deploy/compose.yaml config
      - name: Build ARM64 backend image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=backend
          --cache-to type=gha,mode=max,scope=backend
          -f deploy/Dockerfile.backend .
      - name: Build ARM64 web image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=web
          --cache-to type=gha,mode=max,scope=web
          -f deploy/Dockerfile.web .
