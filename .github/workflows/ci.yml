name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: ruff check server tests migrations
      - run: mypy server/wsi_viewer
      - run: pytest --cov=wsi_viewer --cov-report=term-missing

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  containers:
    runs-on: ubuntu-24.04
    env:
      DOMAIN: viewer.example.test
      ACME_EMAIL: ci@example.test
      PATHLAB_SECRET_KEY: ci-only-secret-not-used-in-production
      PATHLAB_DATA_DIR: /tmp/pathlab-data
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Validate deployment shell syntax
        run: bash -n deploy/scripts/*.sh
      - name: Validate Compose configuration
        run: docker compose -f deploy/compose.yaml config
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e DOMAIN -e ACME_EMAIL
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Build ARM64 backend image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=backend
          --cache-to type=gha,mode=max,scope=backend
          -f deploy/Dockerfile.backend .
      - name: Build ARM64 web image
        run: >-
          docker buildx build --platform linux/arm64
          --cache-from type=gha,scope=web
          --cache-to type=gha,mode=max,scope=web
          -f deploy/Dockerfile.web .
