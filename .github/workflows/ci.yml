name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: ruff check server tests migrations
      - run: mypy server/wsi_viewer
      - run: pytest --cov=wsi_viewer --cov-report=term-missing

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "11.9.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "24.14.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  containers:
    runs-on: ubuntu-24.04
    env:
      DOMAIN: viewer.example.test
      ACME_EMAIL: ci@example.test
      PATHLAB_SECRET_KEY: ci-only-secret-not-used-in-production
      PATHLAB_DATA_DIR: /tmp/pathlab-data
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: docker compose -f deploy/compose.yaml config
      - run: docker buildx build --platform linux/arm64 -f deploy/Dockerfile.backend .
      - run: docker buildx build --platform linux/arm64 -f deploy/Dockerfile.web .
